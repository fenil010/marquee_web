<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #container {
        width: 400px;
        height: 650px;
        border-radius: 20px;
        box-sizing: border-box;
        box-shadow: 2px 2px 5px gray;
        margin: 10vw;
      }
      .img-container {
        position: relative;
      }
      .details {
        margin: 20px;
      }
      h2 {
        text-transform: uppercase;
        font-family:
          'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        color: rgb(225, 151, 59);
      }
      h3 {
        background-color: black;
        color: beige;
        width: 40%;
        text-align: center;
        border-radius: 20px;
        padding: 5px;
      }
      p {
        font-family: Georgia, 'Times New Roman', Times, serif;
        font-weight: 600;
      }
      .img-container {
        position: relative;
      }
      .like-box {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 15px;
        border-radius: 50%;
        background-color: white;
      }
    </style>
  </head>
  <body>
    <article id="container">
      <!-- Section 1 -->
      <section class="img-container">
        <div class="like-box">❤️</div>
        <img
          src="https://cdn11.bigcommerce.com/s-21x65e8kfn/images/stencil/original/products/76805/406334/NIK23741_1000_12__45572.1740583215.jpg"
          alt="product image"
          width="100%"
          style="border-radius: 20px 20px 0px 0px"
        />
      </section>

      <!-- Section 2 -->

      <section class="details">
        <h2>Nike Shoes</h2>
        <h3>$41.00 USD</h3>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Ullam sit
          facilis, unde ea impedit rem esse corrupti minima quaerat voluptate
          sunt.
        </p>
      </section>
    </article>
  </body>
</html>
