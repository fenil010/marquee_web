<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#111;
    }

    .card{
      width:320px;
      background:#fff;
      border-radius:12px;
      padding:25px 20px;
      text-align:center;
      position:relative;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .top-icons{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
      color:#555;
      font-size:18px;
      cursor:pointer;
    }

    .profile-img{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid #f1f1f1;
      margin-bottom:15px;
    }

    .name{
      font-size:32px;
      font-weight:600;
      color:#222;
    }

    .job{
      color:#777;
      margin-top:5px;
      margin-bottom:20px;
      font-size:18px;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-bottom:25px;
    }

    .social-icons a{
      width:40px;
      height:40px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-radius:50%;
      background:#f7f7f7;
      color:#555;
      text-decoration:none;
      font-size:18px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .social-icons a:hover{
      transform:translateY(-3px);
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      margin-bottom:25px;
    }

    .buttons button{
      padding:12px 28px;
      border:none;
      border-radius:8px;
      background:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,0.12);
      cursor:pointer;
      font-size:16px;
      font-weight:500;
      transition:0.3s;
    }

    .buttons button:hover{
      background:#f5f5f5;
    }

    .stats{
      display:flex;
      justify-content:space-around;
      border-top:1px solid #eee;
      padding-top:20px;
      color:#555;
      font-size:18px;
    }

    .stats div{
      display:flex;
      align-items:center;
      gap:8px;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="top-icons">
      <i class="fa-solid fa-arrow-left"></i>
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <img 
      src="IMG_20260210_165249.png" 
      alt="Profile"
      class="profile-img"
    >

    <h2 class="name">CoderAledx</h2>
    <p class="job">Designer & Developer</p>

    <div class="social-icons">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <div class="buttons">
      <button>Message</button>
      <button>Subscribe</button>
    </div>

    <div class="stats">
      <div>
        <i class="fa-regular fa-heart"></i>
        <span>20.4k</span>
      </div>

      <div>
        <i class="fa-regular fa-comment"></i>
        <span>14.3k</span>
      </div>

      <div>
        <i class="fa-solid fa-share"></i>
        <span>12.8k</span>
      </div>
    </div>

  </div>

</body>
</html>
