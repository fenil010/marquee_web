<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Areas Gallery</title>
    <link rel="stylesheet" href="photo.css">
</head>
<body>
    <div class="header-section">
        <h2>Interactive Photo Gallery</h2>
        <input type="text" id="searchInput" placeholder="Search (e.g., nature, ocean, path...)">
    </div>
    
    <div class="grid-container" id="gallery">
      <div class="grid-item item-1" data-title="forest nature trees" style="background-image: url('https://picsum.photos/id/10/400/400');"></div>
      <div class="grid-item item-2" data-title="nature lake water" style="background-image: url('https://picsum.photos/id/11/400/400');"></div>
      <div class="grid-item item-3" data-title="ocean beach waves" style="background-image: url('https://picsum.photos/id/12/400/400');"></div>
      <div class="grid-item item-4" data-title="landscape mountain" style="background-image: url('https://picsum.photos/id/13/400/400');"></div>
      <div class="grid-item item-5" data-title="ocean beach sunset" style="background-image: url('https://picsum.photos/id/14/400/400');"></div>
      <div class="grid-item item-6" data-title="water waterfall nature" style="background-image: url('https://picsum.photos/id/15/400/400');"></div>
      <div class="grid-item item-7" data-title="nature woods green" style="background-image: url('https://picsum.photos/id/16/400/400');"></div>
      <div class="grid-item item-8" data-title="path road dirt" style="background-image: url('https://picsum.photos/id/17/400/400');"></div>
      <div class="grid-item item-9" data-title="landscape grass field" style="background-image: url('https://picsum.photos/id/18/400/400');"></div>
      <div class="grid-item item-10" data-title="landscape hills" style="background-image: url('https://picsum.photos/id/19/400/400');"></div>
      <div class="grid-item item-11" data-title="office desk workspace" style="background-image: url('https://picsum.photos/id/20/400/400');"></div>
      <div class="grid-item item-12" data-title="nature forest mountain" style="background-image: url('https://picsum.photos/id/28/400/400');"></div>
    </div>
</body>
</html>
